<div class="list-container">
  <div class="controls">
    <div class="page-size">
      <label for="pageSize">Items per page:</label>
      <select id="pageSize" [value]="pageSize()" (change)="onSizeSelection($event)">
        @for (size of pageSizes; track size) {
          <option [value]="size">{{ size }}</option>
        }
      </select>
    </div>

    <nav class="pagination" aria-label="Pagination">
      <button (click)="onPrevPage()" [disabled]="pageIndex() === 0 || isLoading()" aria-label="Previous Page">Prev</button>
      <span aria-live="polite" class="page-info">Page {{ pageIndex() + 1 }}</span>
      <button (click)="onNextPage()" [disabled]="ingredients().length < pageSize() || isLoading()" aria-label="Next Page">Next</button>
    </nav>
  </div>

  @if (isLoading()) {
    <div class="status-msg" aria-live="polite">Loading ingredients...</div>
  } @else if (ingredients().length === 0) {
    <div class="status-msg">No ingredients found.</div>
  } @else {
    <ul class="grid">
      @for (ing of ingredients(); track ing.id) {
        <li class="card">
          <div class="card-header">
            <h3>{{ ing.name }}</h3>
            @if (ing.unit) {
              <span class="badge">{{ ing.unit }}</span>
            }
          </div>
        </li>
      }
    </ul>
  }
</div>
