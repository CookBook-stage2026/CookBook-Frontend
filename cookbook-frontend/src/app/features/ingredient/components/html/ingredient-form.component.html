<form [formGroup]="form" (ngSubmit)="onSubmit()" class="ingredient-form" aria-labelledby="form-title">
  <h2 id="form-title">Add New Ingredient</h2>

  <div class="form-group">
    <label for="name">Name <span aria-hidden="true">*</span></label>
    <input id="name" type="text" formControlName="name" aria-required="true"
           [attr.aria-invalid]="form.controls.name.invalid && form.controls.name.touched">
    @if (form.controls.name.invalid && form.controls.name.touched) {
      <span class="error-msg" role="alert">Name is required</span>
    }
  </div>

  <div class="form-group">
    <label for="description">Description <span aria-hidden="true">*</span></label>
    <input id="description" type="text" formControlName="description" aria-required="true"
           [attr.aria-invalid]="form.controls.description.invalid && form.controls.description.touched">
    @if (form.controls.description.invalid && form.controls.description.touched) {
      <span class="error-msg" role="alert">Description is required</span>
    }
  </div>

  <div class="form-group">
    <label for="unit">Unit</label>
    <select id="unit" formControlName="unit">
      <option [ngValue]="null">None</option>
      @for (u of units; track u) {
        <option [value]="u">{{ u }}</option>
      }
    </select>
  </div>

  <button type="submit" [disabled]="form.invalid || isSubmitting()" class="btn-primary">
    @if (isSubmitting()) {
      Adding...
    } @else {
      Add Ingredient
    }
  </button>
</form>
