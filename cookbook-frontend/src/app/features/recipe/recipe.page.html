<app-toast />

<div class="page-container">
  <header class="page-header">
    <div>
      <h1>Recipes</h1>
      <p class="subtitle">Your culinary collection.</p>
    </div>

    <div class="header-actions" style="display: flex; gap: 8px; align-items: center;">
      <button
        mat-stroked-button
        type="button"
        (click)="togglePreferences()"
        [color]="applyPreferences() ? 'primary' : ''"
        [attr.aria-pressed]="applyPreferences()">
        <mat-icon>{{ applyPreferences() ? 'visibility' : 'visibility_off' }}</mat-icon>
        {{ applyPreferences() ? 'Using Preferences' : 'Ignoring Preferences' }}
      </button>

      <button
        mat-flat-button
        color="primary"
        (click)="openModal()">
        <mat-icon>add</mat-icon>
        Add Recipe
      </button>
    </div>
  </header>

  <app-recipe-filter
    (selectedIngredientsChange)="onFilterChange($event)">
  </app-recipe-filter>

  <app-recipe-list
    [recipes]="recipes()"
    [pageSize]="pageSize()"
    [pageIndex]="pageIndex()"
    [totalPages]="totalPages()"
    [isLoading]="isLoading()"
    (pageChange)="onPageChange($event)">
  </app-recipe-list>
</div>

<app-recipe-create-modal
  [isOpen]="isCreateModalOpen()"
  (closeModal)="closeModal()"
  (recipeCreated)="onRecipeCreated()">
</app-recipe-create-modal>
