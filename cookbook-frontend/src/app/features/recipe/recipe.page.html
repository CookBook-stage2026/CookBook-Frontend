<app-toast />

<div class="page-container">
  <header class="page-header">
    <div>
      <h1>Recipes</h1>
      <p class="subtitle">Your culinary collection.</p>
    </div>

    <button (click)="openModal()" class="btn-primary">
      <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M5 12h14"/><path d="M12 5v14"/>
      </svg>
      Add Recipe
    </button>
  </header>

  <div class="placeholder-state">
    <svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" class="placeholder-icon">
      <path d="M12 2v20"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/>
    </svg>
    <h2>Recipe View Coming Soon</h2>
    <p>The grid view for all recipes is currently under construction. For now, you can still use the button above to add new recipes to the database.</p>
  </div>
</div>

<app-recipe-create-modal
  [isOpen]="isCreateModalOpen()"
  (closeModal)="closeModal()"
  (recipeCreated)="onRecipeCreated()">
</app-recipe-create-modal>
