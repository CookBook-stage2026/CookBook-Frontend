<mat-card class="recipe-card">
  <mat-card-header>
    <mat-card-title class="text">{{ recipe().name }}</mat-card-title>
  </mat-card-header>

  <mat-card-content>
    <p class="text">{{ recipe().description }}</p>
  </mat-card-content>

  <mat-card-actions class="recipe-footer">
    <mat-icon>schedule</mat-icon>
    <span>{{ recipe().durationInMinutes | duration }}</span>
  </mat-card-actions>
</mat-card>
