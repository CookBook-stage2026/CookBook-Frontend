<div class="list-container">
  <div>
    <nav class="pagination">
      <button mat-stroked-button (click)="onPrevPage()" [disabled]="pageIndex() === 0 || isLoading()">Prev</button>
      <span class="page-info">Page {{ pageIndex() + 1 }}</span>
      <button mat-stroked-button (click)="onNextPage()" [disabled]="recipes().length < pageSize() || isLoading()">Next</button>
    </nav>
  </div>

  @if (isLoading()) {
    <div class="status-msg">Loading recipes...</div>
  } @else if (recipes().length === 0) {
    <div class="status-msg">No recipes found.</div>
  } @else {
    <ul class="grid">
      @for (recipe of recipes(); track recipe.id) {
        <li>
          <app-recipe-card [recipe]="recipe" />
        </li>
      }
    </ul>
  }
</div>
