<app-toast></app-toast>

<div class="page-header">
  <div class="header-content">
    <h1>Your Week Schedule</h1>
    <p class="subtitle">Plan your meals for the week ahead</p>
  </div>
  <button
    mat-flat-button
    color="primary"
    class="create-btn"
    (click)="openCreateModal()"
  >
    <mat-icon>add</mat-icon>
    Create New Schedule
  </button>
</div>

<div class="schedule-container">
  <app-week-schedule-view
    [refreshTrigger]="refreshSignal()"
  />
</div>

@if (isCreateModalOpen()) {
  <div class="modal-overlay" (click)="closeCreateModal()" (keydown.esc)="closeCreateModal()">
    <div class="modal-container" (click)="$event.stopPropagation()" (keydown.esc)="$event.stopPropagation()">
      <div class="modal-header">
        <h3>Create Schedule</h3>
        <button mat-icon-button (click)="closeCreateModal()" class="close-btn">
          <mat-icon>close</mat-icon>
        </button>
      </div>
      <app-week-schedule-create
        (closeModal)="closeCreateModal()"
        (scheduleCreated)="onScheduleCreated()"
      />
    </div>
  </div>
}
